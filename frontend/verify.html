<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top left, #ffe4be 0, transparent 30%), linear-gradient(135deg, #fff3e0, #f2e7d7);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 18px;
    }
    .card {
      background: rgba(255,255,255,0.97);
      padding: 32px;
      border-radius: 20px;
      width: 380px;
      box-shadow: 0 20px 45px rgba(91, 58, 17, 0.15);
      border: 1px solid #efddc7;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #d8c6ae;
      font: inherit;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 140px;
      padding: 12px;
      background: linear-gradient(135deg, #d97706, #f59e0b);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .secondary {
      background: #efe2cf;
      color: #6b4a1f;
    }
    .status {
      margin-top: 12px;
      color: #6b7280;
      font-size: 14px;
    }
    .helper {
      margin-top: 8px;
      color: #9a3412;
      font-size: 13px;
    }
    .links {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
    }
    .links a {
      color: #d97706;
      margin: 0 6px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Verify Your Email</h2>
    <p>Enter the 6-digit verification code sent to your email address.</p>
    <input id="email" placeholder="Email">
    <input id="code" placeholder="Verification code" maxlength="6">
    <div class="actions">
      <button id="verifyBtn">Verify</button>
      <button class="secondary" id="resendBtn">Resend Code</button>
    </div>
    <div id="status" class="status"></div>
    <div id="helper" class="helper"></div>
    <div class="links">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="support.html">Support</a>
    </div>
  </div>

  <script src="js/verify-page.js"></script>
</body>
</html>
