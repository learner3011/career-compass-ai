<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - Career Compass AI</title>
  <style>
    :root {
      --bg: #f6efe7;
      --panel: #fffdf9;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #eadbc8;
      --accent: #d97706;
      --accent-soft: #efe2cf;
      --shadow: 0 18px 44px rgba(91, 58, 17, 0.12);
    }
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", Arial, sans-serif; background: linear-gradient(180deg, #fff8ee 0%, var(--bg) 100%); margin: 0; color: var(--ink); }
    header { background: rgba(39, 26, 7, 0.94); color: white; padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; }
    header button { background: var(--accent-soft); border: none; padding: 10px 15px; color: #6b4a1f; border-radius: 12px; cursor: pointer; font-weight: 700; }
    .nav-buttons { display: flex; gap: 10px; }
    .header-right { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .profile-chip { display: inline-flex; align-items: center; gap: 10px; padding: 8px 12px 8px 8px; border-radius: 999px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.16); }
    .profile-badge { width: 38px; height: 38px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f59e0b, #b45309); color: white; font-weight: 800; }
    .profile-email { color: white; font-size: 13px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .container { max-width: 1050px; margin: 0 auto; padding: 24px 18px 40px; }
    .top-bar { display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center; }
    input { padding: 12px 14px; width: 320px; border-radius: 14px; border: 1px solid #d8c6ae; background: white; }
    .card { background: var(--panel); padding: 20px; margin-bottom: 18px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--line); transition: 0.2s; }
    .card:hover { transform: translateY(-3px); }
    .card-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .actions button { margin-left: 8px; padding: 8px 13px; border: none; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 700; }
    .view-btn { background: #2563eb; color: white; }
    .delete-btn { background: #dc2626; color: white; }
    .badges { margin-top: 10px; }
    .badge { padding: 6px 12px; border-radius: 999px; color: white; font-size: 12px; margin-right: 8px; display: inline-block; }
    .high { background: #16a34a; }
    .medium { background: #facc15; color: black; }
    .low { background: #dc2626; }
    .match { background: #374151; }
    .date { font-size: 12px; color: gray; margin-top: 8px; }
    .empty { text-align: center; margin-top: 50px; color: gray; }
    .footer-links { margin-top: 18px; display: flex; gap: 14px; flex-wrap: wrap; }
    .footer-links a { color: #b45309; text-decoration: none; font-weight: 600; }
    @media (max-width: 700px) { header, .card-header, .top-bar { flex-direction: column; align-items: flex-start; } input { width: 100%; } .header-right { width: 100%; justify-content: space-between; } }
  </style>
</head>
<body>
<header>
  <h2>Resume History</h2>
  <div class="header-right">
    <div class="profile-chip">
      <div class="profile-badge" id="profileBadge">U</div>
      <div class="profile-email" id="profileEmail">user@example.com</div>
    </div>
    <div class="nav-buttons">
      <button onclick="window.location.href='home.html'">Home</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="top-bar">
    <input id="search" placeholder="Search by file or role..." oninput="filterData()">
  </div>
  <div id="history"></div>
  <div class="footer-links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms & Conditions</a>
    <a href="support.html">Support</a>
  </div>
</div>

<script>
function getApiBase() {
  const override = localStorage.getItem("careerCompassApiBaseUrl");
  if (override) return override.replace(/\/$/, "");
  if (window.location.protocol === "file:") return "http://localhost:5000";
  if ((window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") && window.location.port !== "5000") {
    return `${window.location.protocol}//${window.location.hostname}:5000`;
  }
  return window.location.origin;
}

const API = getApiBase();
const token = localStorage.getItem("token");
const USER_EMAIL_KEY = "careerCompassUserEmail";
let allData = [];

if (!token) {
  window.location.href = "login.html";
}

function handleUnauthorized() {
  localStorage.removeItem("token");
  localStorage.removeItem(USER_EMAIL_KEY);
  alert("Your session has expired. Please login again.");
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem(USER_EMAIL_KEY);
  window.location.href = "login.html";
}

function setUserEmail(email) {
  const safeEmail = email || "user@example.com";
  document.getElementById("profileEmail").innerText = safeEmail;
  document.getElementById("profileBadge").innerText = safeEmail.charAt(0).toUpperCase();
  localStorage.setItem(USER_EMAIL_KEY, safeEmail);
}

async function syncProfile() {
  const storedEmail = localStorage.getItem(USER_EMAIL_KEY);
  if (storedEmail) setUserEmail(storedEmail);

  try {
    const res = await fetch(`${API}/me`, {
      headers: { Authorization: token }
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok && data.email) setUserEmail(data.email);
  } catch {}
}

function getScoreClass(score) {
  if (score >= 75) return "high";
  if (score >= 50) return "medium";
  return "low";
}

function formatTimestamp(value) {
  if (!value) return "Unknown time";

  const normalized = typeof value === "string" && value.includes(" ")
    ? `${value.replace(" ", "T")}Z`
    : value;

  const date = new Date(normalized);
  if (Number.isNaN(date.getTime())) return value;

  return date.toLocaleString("en-IN", {
    dateStyle: "medium",
    timeStyle: "short"
  });
}

function render(data) {
  const container = document.getElementById("history");

  if (!data.length) {
    container.innerHTML = `<p class="empty">No history found</p>`;
    return;
  }

  container.innerHTML = data.map(item => `
    <div class="card">
      <div class="card-header">
        <div>
          <h3>${item.filename || "Resume"}</h3>
          <p><b>Role:</b> ${item.jobRole || "N/A"}</p>
        </div>

        <div class="actions">
          <button class="view-btn" onclick="view('${item.id}')">View</button>
          <button class="delete-btn" onclick="deleteReport('${item.id}')">Delete</button>
        </div>
      </div>

      <div class="badges">
        <span class="badge ${getScoreClass(item.score)}">Score: ${item.score}</span>
        <span class="badge match">Match: ${item.jobMatch}%</span>
      </div>

      <p class="date">${formatTimestamp(item.created_at)}</p>
    </div>
  `).join("");
}

function filterData() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = allData.filter(item =>
    (item.filename || "").toLowerCase().includes(q) ||
    (item.jobRole || "").toLowerCase().includes(q)
  );
  render(filtered);
}

function view(id) {
  window.location.href = `report.html?id=${id}`;
}

async function deleteReport(id) {
  if (!confirm("Delete this report?")) return;

  try {
    const res = await fetch(`${API}/delete/${id}`, {
      method: "DELETE",
      headers: { Authorization: token }
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      if (res.status === 401) {
        handleUnauthorized();
        return;
      }

      alert(data.error || "Failed to delete report");
      return;
    }

    loadHistory();
  } catch (err) {
    alert("Unable to reach the server. Please try again.");
  }
}

async function loadHistory() {
  try {
    const res = await fetch(`${API}/history`, {
      headers: { Authorization: token }
    });

    const data = await res.json().catch(() => []);

    if (!res.ok) {
      if (res.status === 401) {
        handleUnauthorized();
        return;
      }

      alert(data.error || "Failed to load history");
      render([]);
      return;
    }

    allData = Array.isArray(data) ? data : [];
    render(allData);
  } catch (err) {
    alert("Unable to reach the server. Please try again.");
    render([]);
  }
}

loadHistory();
syncProfile();
</script>
</body>
</html>
