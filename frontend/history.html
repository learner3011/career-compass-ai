<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - Career Compass AI</title>
  <style>
    :root {
      --bg: #f6efe7;
      --panel: #fffdf9;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #eadbc8;
      --accent: #d97706;
      --accent-soft: #efe2cf;
      --shadow: 0 18px 44px rgba(91, 58, 17, 0.12);
    }
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", Arial, sans-serif; background: linear-gradient(180deg, #fff8ee 0%, var(--bg) 100%); margin: 0; color: var(--ink); }
    header { background: rgba(39, 26, 7, 0.94); color: white; padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; }
    header button { background: var(--accent-soft); border: none; padding: 10px 15px; color: #6b4a1f; border-radius: 12px; cursor: pointer; font-weight: 700; }
    .nav-buttons { display: flex; gap: 10px; }
    .header-right { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .profile-chip { display: inline-flex; align-items: center; gap: 10px; padding: 8px 12px 8px 8px; border-radius: 999px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.16); }
    .profile-badge { width: 38px; height: 38px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f59e0b, #b45309); color: white; font-weight: 800; }
    .profile-email { color: white; font-size: 13px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .container { max-width: 1050px; margin: 0 auto; padding: 24px 18px 40px; }
    .top-bar { display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center; }
    input { padding: 12px 14px; width: 320px; border-radius: 14px; border: 1px solid #d8c6ae; background: white; }
    .card { background: var(--panel); padding: 20px; margin-bottom: 18px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--line); transition: 0.2s; }
    .card:hover { transform: translateY(-3px); }
    .card-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .actions button { margin-left: 8px; padding: 8px 13px; border: none; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 700; }
    .view-btn { background: #2563eb; color: white; }
    .delete-btn { background: #dc2626; color: white; }
    .badges { margin-top: 10px; }
    .badge { padding: 6px 12px; border-radius: 999px; color: white; font-size: 12px; margin-right: 8px; display: inline-block; }
    .high { background: #16a34a; }
    .medium { background: #facc15; color: black; }
    .low { background: #dc2626; }
    .match { background: #374151; }
    .date { font-size: 12px; color: gray; margin-top: 8px; }
    .empty { text-align: center; margin-top: 50px; color: gray; }
    .footer-links { margin-top: 18px; display: flex; gap: 14px; flex-wrap: wrap; }
    .footer-links a { color: #b45309; text-decoration: none; font-weight: 600; }
    @media (max-width: 700px) { header, .card-header, .top-bar { flex-direction: column; align-items: flex-start; } input { width: 100%; } .header-right { width: 100%; justify-content: space-between; } }
  </style>
</head>
<body>
<header>
  <h2>Resume History</h2>
  <div class="header-right">
    <div class="profile-chip">
      <div class="profile-badge" id="profileBadge">U</div>
      <div class="profile-email" id="profileEmail">user@example.com</div>
    </div>
    <div class="nav-buttons">
      <button id="homeBtn">Home</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="top-bar">
    <input id="search" placeholder="Search by file or role...">
  </div>
  <div id="history"></div>
  <div class="footer-links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms & Conditions</a>
    <a href="support.html">Support</a>
  </div>
</div>

<script src="js/history-page.js"></script>
</body>
</html>
