<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top left, #ffe4be 0, transparent 30%), linear-gradient(135deg, #fff3e0, #f2e7d7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: rgba(255,255,255,0.96);
      padding: 30px;
      border-radius: 20px;
      width: 340px;
      box-shadow: 0 20px 45px rgba(91, 58, 17, 0.15);
      border: 1px solid #efddc7;
    }
    h2 { text-align: center; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #d8c6ae;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #d97706, #f59e0b);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { opacity: 0.94; }
    a { color: #d97706; text-decoration: none; }
    .links {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
    }
    .links a {
      margin: 0 6px;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>Create Account</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="signupBtn">Signup</button>
  <p style="text-align:center">Already have account? <a href="login.html">Login</a></p>
  <p style="text-align:center; color:#6b7280; font-size:14px;">Uploaded resume data is kept so you can access history, reports, and improved resume versions later.</p>
  <div class="links">
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="support.html">Support</a>
  </div>
</div>
<script src="js/signup-page.js"></script>
</body>
</html>
